name: update the website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: check out this new code
        id: pull
        run: |
          cd ${{ secrets.DIRECTORY }}
          git pull
      - name: docker composure # and it calms you down with dancing fruit videos after docker compose (https://bsky.app/profile/wukko.me/post/3l35kbzmxxs24)
        id: build
        run: |
          cd ${{ secrets.DIRECTORY }}
          docker compose down --volumes
          docker compose up --build -d