name: scan instances

on:
  schedule:
    - cron: '0 * * * *'
  push:
    branches:
      - main
    paths:
      - 'data/**'
      - 'scan.py'
      - '.gitea/workflows/scan.yml'
  workflow_dispatch:

jobs:
  scan:
    runs-on: self-hosted
    steps:
    - name: scan instances
      run: |
        cd ${{ secrets.DIRECTORY }}
        python3 scan.py
