<table>
    <tr>
        <th>Service</th>
        <th>Working?</th>
    </tr>
    {% for service, working in instance['services'].items() %}
    <tr>
        <td>
            {{ service }}
        </td>
        {% if working == True %}
        <td>
            ✅
        </td>
        {% else %}
        <td title="{{ working }}">
            ❌
        </td>
        {% endif %}
    </tr>
    {% endfor %}
</table>
