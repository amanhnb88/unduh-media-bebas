<!DOCTYPE html>
<html lang="en">
<head>
    {% include 'include/head.html' %}
    <title>cobalt instances</title>
    <meta name="description" content="a list of community (and official) cobalt.tools instances">
</head>
<body>
    <header>
        {% include 'include/header.html' %}
    </header>
    <p style="text-align: center; font-size: 24px;" class="disabled">instance: {{ instance['api'] }}</p>
    <main style="display: flex;">
        {% include 'include/instance-table.html' %}
    </main>

    <!-- option handling script -->
    <style id="safeOptionStyle"></style>
    <style id="onlineOptionStyle">
        .score-1 {display: none;}
    </style>
    <style id="frontendOptionStyle">
        .frontendFalse {display: none;}
    </style>
    <script>
        document.getElementById("safe").addEventListener("change", function() {
            if (this.checked) {
                safeOptionStyle.innerText = ".trust0, .trust-1 {display: none;}"
            } else {
                safeOptionStyle.innerText = ""
            }
        });

        document.getElementById("online").addEventListener("change", function() {
            if (this.checked) {
                onlineOptionStyle.innerText = ".score-1 {display: none;}"
            } else {
                onlineOptionStyle.innerText = ""
            }
        });

        document.getElementById("frontend").addEventListener("change", function() {
            if (this.checked) {
                frontendOptionStyle.innerText = ".frontendFalse {display: none;}"
            } else {
                frontendOptionStyle.innerText = ""
            }
        });
    </script>
</body>
</html>
